<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rover's Knowledge Vault</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-title">Rover's Knowledge Vault</a>
      <nav>
        <a href="/dr.html">DR Tool</a>
        <a href="/egg-painter.html">Egg Painter</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off">
      </div>
      <nav class="folder-tree" id="folder-tree"></nav>
    </aside>

    <main class="main-content">
      <div class="notes-grid" id="notes-grid"></div>
    </main>
  </div>

  <script>
    let allNotes = [];
    let currentFolder = '';
    let searchQuery = '';

    async function loadIndex() {
      try {
        const res = await fetch('/notes-index.json?t=' + Date.now());
        allNotes = await res.json();
      } catch (_) {
        allNotes = [];
      }
      buildFolderTree();
      renderNotes();
    }

    function buildFolderTree() {
      const folders = new Set(['']);
      allNotes.forEach(n => {
        const parts = n.folder ? n.folder.split('/') : [];
        let path = '';
        parts.forEach(part => {
          path = path ? path + '/' + part : part;
          folders.add(path);
        });
      });

      const tree = document.getElementById('folder-tree');
      tree.innerHTML = '';

      Array.from(folders).sort().forEach(folder => {
        const depth = folder ? folder.split('/').length : 0;
        const label = folder ? folder.split('/').pop() : 'All Notes';
        const icon  = folder ? '▸' : '◈';

        const el = document.createElement('div');
        el.className = 'folder-item' + (folder === currentFolder ? ' active' : '');
        el.dataset.folder = folder;
        el.style.paddingLeft = (12 + depth * 16) + 'px';
        el.innerHTML = `<span class="folder-icon">${icon}</span>${esc(label)}`;
        el.addEventListener('click', () => {
          currentFolder = folder;
          document.querySelectorAll('.folder-item').forEach(f => f.classList.remove('active'));
          el.classList.add('active');
          renderNotes();
        });
        tree.appendChild(el);
      });
    }

    function renderNotes() {
      let filtered = allNotes;

      if (currentFolder !== '') {
        filtered = filtered.filter(n =>
          n.folder === currentFolder || (n.folder || '').startsWith(currentFolder + '/')
        );
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(n =>
          n.title.toLowerCase().includes(q) ||
          (n.tags || []).some(t => t.toLowerCase().includes(q))
        );
      }

      const grid = document.getElementById('notes-grid');
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p>No notes here yet.</p></div>';
        return;
      }

      // Sort alphabetically by title
      filtered.sort((a, b) => a.title.localeCompare(b.title));

      filtered.forEach(note => {
        const a = document.createElement('a');
        a.className = 'note-card';

        if (note.fileType === 'pdf') {
          a.href   = '/' + note.path;
          a.target = '_blank';
          a.rel    = 'noopener';
        } else if (note.fileType === 'docx') {
          a.href     = '/' + note.path;
          a.download = '';
        } else {
          a.href = '/note.html?path=' + encodeURIComponent(note.path);
        }

        const typeLabel = note.fileType === 'pdf'  ? 'PDF'
                        : note.fileType === 'docx' ? 'DOCX'
                        : '';
        const typeBadge = typeLabel
          ? `<span class="file-type-badge file-type-${note.fileType}">${typeLabel}</span>`
          : '';

        a.innerHTML =
          `<div class="note-card-title-row"><span class="note-card-title">${esc(note.title)}</span>${typeBadge}</div>` +
          (note.folder ? `<div class="note-card-folder">${esc(note.folder)}</div>` : '') +
          ((note.tags && note.tags.length)
            ? `<div class="note-card-tags">${note.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
            : '');
        grid.appendChild(a);
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderNotes();
    });

    loadIndex();
  </script>
</body>
</html>
